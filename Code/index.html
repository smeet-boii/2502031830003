<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GlobeMuseum - Virtual Museum Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Pannellum 360 Viewer -->
    <script src="https://pannellum.org/js/pannellum.js"></script>
    <link rel="stylesheet" href="https://pannellum.org/css/pannellum.css" />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        /* General */
        body {
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        section {
            padding: 80px 0;
        }

        /* Hero */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('https://images.unsplash.com/photo-1580657018950-c7f7d6a2f4f4?auto=format&fit=crop&w=1600&q=80') center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* Cards */
        .museum-card {
            transition: 0.3s;
        }

        .museum-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        /* Forms */
        .form-box {
            max-width: 400px;
            margin: auto;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: white;
        }

        /* Dark Mode */
        .dark-mode {
            background: #121212;
            color: white;
        }

        .dark-mode .card {
            background: #1e1e1e;
            color: white;
        }

        .dark-mode .navbar {
            background: #000 !important;
        }

        .dark-mode .form-box {
            background: #1e1e1e;
            color: white;
        }

        /* Panorama */
        #panorama {
            width: 100%;
            height: 400px;
            border-radius: 10px;
        }

        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">GlobeMuseum</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/mesuem.html">Museums</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
                </ul>
                <button class="btn btn-outline-light ms-3" onclick="toggleDarkMode()">🌙</button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home" class="hero">
        <div>
            <h1>Explore Museums Around The World</h1>
            <p>Experience Art & History From Anywhere</p>
            <a href="/ticket.html" class="btn btn-primary btn-lg">Start Exploring</a>
        </div>
    </section>

    

</body>

</html>
