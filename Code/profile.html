<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Profile - GlobeMuseum</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #e6e6e6;
        }

        .navbar {
            background: #2f3437;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #ccc;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .profile-card {
            background: #d9d9d9;
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            border: 3px solid #8d8d8d;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 4px solid #777;
            object-fit: cover;
        }

        .profile-card h2 {
            margin-bottom: 5px;
        }

        .role {
            color: #555;
            margin-bottom: 20px;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info p {
            font-size: 18px;
            margin: 10px 0;
        }


        .buttons {
            margin-top: 25px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }

        .edit-btn {
            background: #21824d;
            color: white;
        }

        .logout-btn {
            background: #c0392b;
            color: white;
        }

        .edit-btn:hover {
            background: #1b6f41;
        }

        .logout-btn:hover {
            background: #a93226;
        }
    </style>
</head>

<body>



    <div class="navbar">

        <div class="logo">GlobeMuseum</div>

        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/mesuem.html">Museums</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/contact.html">Contact</a>
        </div>

    </div>




    <div class="container">

        <div class="profile-card">

            <img src="https://via.placeholder.com/120" class="profile-img">

            <h2>Dhoni Kholi</h2>
            <p class="role">Museum Visitor</p>

            <div class="info">

                <p><strong>Email:</strong> dhonikholi@email.com</p>
                <p><strong>Country:</strong> USA</p>
                <p><strong>Member Since:</strong> 2025</p>

            </div>

            <div class="buttons">

                <button class="edit-btn">Edit Profile</button>
                <button class="logout-btn">Logout</button>

            </div>

        </div>

    </div>

</body>

</html>
