<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register | GlobeMuseum</title>
    <style>
        .containers {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #efefef;
            padding: 40px;
            width: 420px;
            border-radius: 25px;
            border: 3px solid #8d8d8d;
        }

        .card h2 {
            margin-bottom: 25px;
            font-size: 32px;
        }

        /* Form */

        label {
            display: block;
            margin-top: 15px;
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 12px;
            border: 3px solid #8d8d8d;
            font-size: 16px;
            outline: none;
        }

        .login-link {
            margin-top: 18px;
            font-size: 16px;
        }

        .login-link a {
            text-decoration: none;
        }

        /* Button */

        .sbt {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            font-size: 22px;
            border: none;
            border-radius: 16px;
            background: #21824d;
            color: white;
            cursor: pointer;
        }

        .sbt:hover {
            background: #1b6f41;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">GlobeMuseum</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/mesuem.html">Museums</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
                </ul>
                <button class="btn btn-outline-light ms-3"" onclick=" toggleDarkMode()">🌙</button>
            </div>
        </div>
    </nav>


    <div class="containers">

        <div class="card">

            <h2>Register</h2>

            <form>

                <label>Name:</label>
                <input type="text" placeholder="Enter Name">

                <label>Email:</label>
                <input type="email" placeholder="Enter Email">

                <label>Password:</label>
                <input type="password" placeholder="Enter Password">

                <div class="login-link">
                    I have an account <a href="/login.html">login</a>
                </div>

                <button class="sbt" type="submit">Register</button>

            </form>

        </div>

    </div>

</body>

</html>
